# Reverse-proxy vhost for the calculator, fronted by the host's existing nginx.
# The app container is published on 127.0.0.1:8090 (docker-compose.nginx.yml).
# Install: copy to /etc/nginx/sites-available/ (+ symlink) or /etc/nginx/conf.d/,
# then run `certbot --nginx -d calculator.atamuragroup.kz` to add TLS + redirect.
server {
    listen 80;
    listen [::]:80;
    server_name calculator.atamuragroup.kz;

    # Match the app's 1MB request-body cap.
    client_max_body_size 1m;

    location / {
        proxy_pass http://127.0.0.1:8090;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        # App reads the RIGHTMOST X-Forwarded-For entry as the real client IP;
        # $proxy_add_x_forwarded_for appends $remote_addr, so it lands rightmost.
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
