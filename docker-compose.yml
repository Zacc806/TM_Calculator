services:
  app:
    build: .
    image: tm-calculator:latest
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      HOST: 0.0.0.0
      PORT: "3000"
      STATIC_ROOT: /app/web
      PROGRAMS_FILE: /app/data/programs.json
      LEADS_FILE: /app/data/leads.jsonl
      SITE_LEADS_FILE: /app/data/site-leads.jsonl
    volumes:
      - tmcalc-data:/app/data
    ports:
      - "127.0.0.1:18090:3000"
volumes:
  tmcalc-data:
